# .github/workflows/...
name: Contrôle Qualité WebPerf (Lighthouse)

# Le script se déclenche à chaque push ou pull request sur le dépôt de l'étudiant
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  audit-performance:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code source de l'étudiant déposé sur GitHub
      - name: Code Checkout
        uses: actions/checkout@v4

      # 2. Lancement d'un serveur web en arrière-plan (Python est préinstallé sur l'environnement GitHub)
      # Ce serveur permet de simuler un hébergement local à l'adresse http://localhost:8080
      - name: Démarrage du Serveur Local
        run: |
          python3 -m http.server 8080 &
          sleep 3 # Pause de 3 secondes pour s'assurer que le serveur est totalement prêt

      # 3. Exécution de l'audit automatisé Lighthouse
      - name: Exécution de l'audit Google Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
            http://localhost:8080/dashboard.html
          budgetPath: ./lighthouse-budget.json # Lien vers le fichier de règles ci-dessous
          uploadArtifacts: true # Sauvegarde le rapport HTML final dans les pièces jointes GitHub
          temporaryPublicStorage: true # Génère un lien de rapport public temporaire pour une lecture rapide